<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>語文星球｜啾咪宇宙</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:"Microsoft JhengHei",Arial,sans-serif;
  background:linear-gradient(180deg,#fff4dd,#e8fff3);
  color:#4a3b5c;
  text-align:center;
}

.wrap{
  max-width:900px;
  margin:auto;
  padding:50px 20px;
}

.card{
  background:#fff;
  border-radius:26px;
  padding:30px;
  margin:22px 0;
  box-shadow:0 10px 25px rgba(160,120,200,.2);
}

h1{
  color:#f0a500;
  font-size:42px;
}

h3{
  color:#f0a500;
}

p{
  line-height:1.8;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 22px;
  border-radius:999px;
  background:#ffd66b;
  color:#4a3b5c;
  text-decoration:none;
  font-weight:bold;
  transition:all .3s ease;
}

.btn:hover{
  transform:scale(1.06);
  background:#ffcc4d;
}

.episode{
  padding:22px;
  margin:24px 0;
  border-radius:22px;
  background:#fffaf4;
  box-shadow:0 6px 16px rgba(160,120,200,.12);
  border:2px dashed #ffd98a;
}

.episode h4{
  color:#7b4fd6;
  font-size:23px;
  margin-bottom:10px;
}

.episode p{
  color:#6b6078;
  margin:8px 0 14px;
}

.eng{
  font-size:26px;
  color:#7b4fd6;
  font-weight:bold;
}

.note{
  font-size:14px;
  color:#8b7f99;
}
</style>
</head>

<body>
<div class="wrap">

  <h1>📚 語文星球</h1>

  <div class="card">
    <p>
      每日一句英文，姊姊一句、妹妹一句，<br>
      用可愛又有趣的方式一起學語文。
    </p>
  </div>

  <div class="card">
    <h3>📚 啾咪說英文</h3>

    <div class="episode">
      <h4 class="eng">My brain needs a vacation.</h4>
      <p>我的腦袋需要放假了。</p>

      <a class="btn"
         href="https://www.facebook.com/share/r/1EaCf1cbPc/"
         target="_blank">
         ▶️ Facebook 觀看
      </a>
    </div>

    <div class="episode">
      <h4 class="eng">Keep smiling.</h4>
      <p>保持微笑。</p>

      <a class="btn"
         href="https://www.facebook.com/share/r/1EaCf1cbPc/"
         target="_blank">
         ▶️ Facebook 觀看
      </a>
    </div>
  </div>

  <div class="card">
    <h3>🌟 未來會加入</h3>
    <div class="episode">
      <h4>日文小句子</h4>
      <p>之後也可以放啾咪日文課、旅行用語、生活短句。</p>
      <p class="note">準備中</p>
    </div>
  </div>

  <a class="btn" href="index.html">回啾咪宇宙</a>

</div>
</body>
</html>
